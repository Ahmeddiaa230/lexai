services:
  - type: web
    name: lexai-backend
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MAX_FILE_SIZE_MB
        value: 10
      - key: ANTHROPIC_API_KEY
        sync: false          # You will set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # You will set this to your Vercel URL after deploying frontend
